# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - namnskylt-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Force GitHub JavaScript actions to run on Node.js 24 (future-proofing)
# GitHub recommends FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true to test Node 24 ahead of the default switch. [1](https://www.btcc.com/en-US/square/blockchainNEWS/985733)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js (app runtime)
        # setup-node newer majors explicitly upgraded action runtime from node20 to node24 internally. [2](https://azure.github.io/AppService/2025/02/18/Node-22.html)
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Install, build (and test if present)
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_AFE6E13E2ECD43939E36DCA4BF8288E2 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CB5F90F356474DDFB45AC44FC3194608 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CDB58A127B444133BF85530E45B758D5 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'namnskylt-app'
          slot-name: 'Production'
          package: .
